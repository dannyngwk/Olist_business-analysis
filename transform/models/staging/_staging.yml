version: 2
models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: order_status
        tests:
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable, invoiced, processing, created, approved]
  - name: stg_order_items
    columns:
      - name: order_id
        tests: [not_null]
      - name: price
        tests: [not_null]
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]
  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]
  - name: stg_order_reviews
    columns:
      - name: review_score
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]
