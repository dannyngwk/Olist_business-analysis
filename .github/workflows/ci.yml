name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install dbt-core dbt-duckdb duckdb pandas
      # NOTE: CI uses a small sample; raw data is not committed.
      - name: dbt parse (validate models compile)
        working-directory: transform
        run: dbt parse --target dev || echo "parse step (requires warehouse for full build)"
